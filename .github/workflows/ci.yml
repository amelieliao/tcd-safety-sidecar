name: CI

on:
  push:
  pull_request:

jobs:
  correctness-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          if [ -f pyproject.toml ] || [ -f setup.py ]; then python -m pip install -e .; fi
          python -m pip install pytest httpx fastapi pydantic prometheus-client numpy

      - name: Run correctness gates
        run: |
          python -m pytest -q \
            tests/test_receipt_negative_regression.py \
            tests/test_service_http_detector_targeted_integration.py
